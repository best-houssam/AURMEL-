<!DOCTYPE html>

<title>HOUSSAM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;900&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold-1: #c8973a;
  --gold-2: #e8c86a;
  --gold-3: #f7e4a0;
  --gold-4: #fff8e7;
  --dark: #03020a;
  --dark-2: #07050f;
  --dark-3: #0e0c1a;
  --white: #fdf8f0;
}

html, body {
  height: 100%;
  background: var(--dark);
  overflow-x: hidden;
}

#stars { position: fixed; inset: 0; z-index: 0; }

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 1;
  animation: orb-drift 14s ease-in-out infinite alternate;
}
.orb-1 { width:500px;height:500px; background:radial-gradient(circle,rgba(180,130,30,0.13),transparent 70%); top:-150px;left:-150px; }
.orb-2 { width:400px;height:400px; background:radial-gradient(circle,rgba(120,60,180,0.08),transparent 70%); bottom:-100px;right:-100px; animation-delay:-7s; }
.orb-3 { width:280px;height:280px; background:radial-gradient(circle,rgba(200,151,58,0.07),transparent 70%); top:50%;left:50%;transform:translate(-50%,-50%); animation-delay:-3s; }

@keyframes orb-drift {
  from { transform: scale(1) translate(0,0); }
  to   { transform: scale(1.18) translate(30px,20px); }
}

.page {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 32px;
}

.crown-wrap {
  margin-bottom: 30px;
  opacity: 0;
  animation: reveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
}
.crown-svg {
  width: 58px; height: auto;
  filter: drop-shadow(0 0 14px rgba(232,200,106,0.65));
}

.name-block {
  text-align: center; position: relative; margin-bottom: 8px;
  opacity: 0;
  animation: reveal 1.4s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
}
.name-sub {
  font-family: 'Raleway', sans-serif;
  font-weight: 100; font-size: 10px; letter-spacing: 0.6em;
  color: var(--gold-1); text-transform: uppercase;
  margin-bottom: 12px; display: block;
}
.name-main {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(56px, 14vw, 110px);
  letter-spacing: 0.18em; line-height: 1;
  color: transparent;
  background: linear-gradient(135deg,#8a6820 0%,#c8973a 20%,#f7e4a0 40%,#e8c86a 50%,#f7e4a0 60%,#c8973a 80%,#8a6820 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text; background-clip: text;
  animation: shimmer 4s ease infinite;
  filter: drop-shadow(0 0 30px rgba(232,200,106,0.25));
}
@keyframes shimmer {
  0%   { background-position: 200% 0%; }
  100% { background-position: -200% 0%; }
}

.divider {
  display: flex; align-items: center; width: 320px; max-width: 100%;
  margin: 28px auto 44px;
  opacity: 0;
  animation: reveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
}
.div-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold-1)); }
.div-line.r { background:linear-gradient(to left,transparent,var(--gold-1)); }
.div-center { display:flex; align-items:center; gap:8px; padding:0 14px; }
.div-d { width:7px;height:7px; background:var(--gold-2); transform:rotate(45deg); box-shadow:0 0 10px rgba(232,200,106,0.8); }
.div-d-sm { width:4px;height:4px; background:var(--gold-1); transform:rotate(45deg); opacity:0.6; }

.cards { display:flex; flex-direction:column; gap:12px; width:100%; max-width:460px; }

.card {
  position: relative; text-decoration: none;
  display: flex; align-items: center;
  overflow: hidden;
  opacity: 0;
  animation: slide-up 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
}
.card:nth-child(1){animation-delay:0.7s}
.card:nth-child(2){animation-delay:0.85s}
.card:nth-child(3){animation-delay:1.0s}
.card:nth-child(4){animation-delay:1.15s}

.card-inner {
  width: 100%;
  display: flex; align-items: center; gap: 20px;
  padding: 20px 24px;
  background: linear-gradient(135deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01));
  border: 1px solid rgba(200,151,58,0.12);
  position: relative;
  transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter: blur(6px);
}
.card-inner::before,.card-inner::after {
  content:''; position:absolute;
  width:12px; height:12px;
  transition: all 0.4s ease; opacity:0;
}
.card-inner::before { top:-1px;left:-1px; border-top:1px solid var(--gold-2); border-left:1px solid var(--gold-2); }
.card-inner::after  { bottom:-1px;right:-1px; border-bottom:1px solid var(--gold-2); border-right:1px solid var(--gold-2); }

.card:hover .card-inner {
  background: linear-gradient(135deg,rgba(200,151,58,0.08),rgba(200,151,58,0.03));
  border-color: rgba(200,151,58,0.35);
  transform: translateY(-2px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(200,151,58,0.06), inset 0 1px 0 rgba(232,200,106,0.1);
}
.card:hover .card-inner::before,.card:hover .card-inner::after { opacity:1; width:20px; height:20px; }

.card-icon {
  width:46px; height:46px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; position:relative; z-index:1;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.card:hover .card-icon { transform: scale(1.1) rotate(-3deg); }
.card-icon svg { width:24px; height:24px; }

.icon-ig { background: linear-gradient(135deg,#405de6,#5851db,#833ab4,#c13584,#e1306c,#fd1d1d,#f56040,#f77737,#fcaf45,#ffdc80); }
.icon-fb { background: #1877F2; }
.icon-yt { background: #FF0000; }
.icon-wa { background: #25D366; }
.icon-tt { background: #000; border:1px solid rgba(255,255,255,0.1); }

.card-text { flex:1; position:relative; z-index:1; }
.card-platform {
  display:block; font-family:'Raleway',sans-serif; font-weight:200;
  font-size:9px; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--gold-1); margin-bottom:4px;
}
.card-handle {
  display:block; font-family:'Playfair Display',serif;
  font-size:18px; font-weight:400; color:var(--white);
  letter-spacing:0.04em; transition:color 0.3s;
}
.card:hover .card-handle { color: var(--gold-3); }

.card-arrow {
  position:relative; z-index:1;
  display:flex; align-items:center; justify-content:center;
  width:32px; height:32px;
  border:1px solid rgba(200,151,58,0.2); border-radius:50%;
  flex-shrink:0; opacity:0; transform:translateX(-10px);
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
}
.card:hover .card-arrow { opacity:1; transform:translateX(0); border-color:rgba(200,151,58,0.5); box-shadow:0 0 12px rgba(200,151,58,0.2); }
.card-arrow svg { width:13px; height:13px; stroke:var(--gold-2); }

.card-scan {
  position:absolute; inset:0;
  background:linear-gradient(to right,transparent,rgba(232,200,106,0.04),transparent);
  transform:translateX(-100%);
  transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
  pointer-events:none;
}
.card:hover .card-scan { transform:translateX(100%); }

.footer {
  margin-top:52px; text-align:center;
  opacity:0; animation:reveal 1s ease 1.5s forwards;
}
.footer-diamonds { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:14px; }
.fd { width:4px;height:4px; background:var(--gold-1); transform:rotate(45deg); opacity:0.3; }
.fd.active { opacity:1; box-shadow:0 0 8px rgba(200,151,58,0.8); animation:pulse-d 2s ease infinite; }
@keyframes pulse-d { 0%,100%{box-shadow:0 0 8px rgba(200,151,58,0.8)} 50%{box-shadow:0 0 18px rgba(232,200,106,1)} }

.footer-text { font-family:'Raleway',sans-serif; font-weight:100; font-size:9px; letter-spacing:0.5em; color:rgba(200,151,58,0.3); text-transform:uppercase; }

@keyframes reveal { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slide-up { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

.particle { position:fixed; border-radius:50%; pointer-events:none; z-index:9990; }
</style>

<script>
// Stars
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);
const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+0.2,alpha:Math.random()*0.6+0.1,speed:Math.random()*0.0006+0.0002,phase:Math.random()*Math.PI*2}));
(function draw(t){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{const a=s.alpha*(0.5+0.5*Math.sin(t*s.speed*1000+s.phase));ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(232,200,106,${a})`;ctx.fill();});requestAnimationFrame(draw);})(0);

// Particle burst
document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('click',e=>{
    for(let i=0;i<14;i++){
      const p=document.createElement('div');
      p.className='particle';
      const angle=(i/14)*Math.PI*2;
      const dist=40+Math.random()*50;
      const size=2+Math.random()*5;
      p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${size}px;height:${size}px;background:${Math.random()>0.5?'#e8c86a':'#f7e4a0'};transition:all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);opacity:1;transform:rotate(${Math.random()*90}deg);`;
      document.body.appendChild(p);
      requestAnimationFrame(()=>{p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`;p.style.opacity='0';});
      setTimeout(()=>p.remove(),700);
    }
  });
});
</script>
