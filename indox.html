<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOUSSAM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7e;
    --gold-pale: #f5e6bb;
    --dark: #080808;
    --dark-2: #111111;
    --dark-3: #1a1a1a;
    --white: #f8f4ee;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
    animation: grain 0.5s steps(1) infinite;
  }

  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-2%, -2%); }
    20% { transform: translate(2%, 2%); }
    30% { transform: translate(-1%, 1%); }
    40% { transform: translate(1%, -1%); }
    50% { transform: translate(-2%, 1%); }
    60% { transform: translate(2%, -2%); }
    70% { transform: translate(-1%, -1%); }
    80% { transform: translate(1%, 2%); }
    90% { transform: translate(-2%, 2%); }
  }

  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  /* Gold horizontal rule */
  .rule {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 0 auto 40px;
    animation: fadeDown 1s ease forwards;
    opacity: 0;
    animation-delay: 0.2s;
  }

  /* Name */
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(52px, 12vw, 96px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
    text-align: center;
    line-height: 1;
    animation: fadeDown 1s ease forwards;
    opacity: 0;
    animation-delay: 0.4s;
    position: relative;
  }

  .name::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-pale), var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .name:hover::after {
    opacity: 1;
  }

  /* Ornament */
  .ornament {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0 48px;
    animation: fadeDown 1s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
  }

  .ornament-line {
    height: 1px;
    width: 60px;
    background: linear-gradient(to right, transparent, var(--gold));
  }

  .ornament-line:last-child {
    background: linear-gradient(to left, transparent, var(--gold));
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .ornament-dot {
    width: 3px;
    height: 3px;
    background: var(--gold-light);
    transform: rotate(45deg);
    opacity: 0.6;
  }

  /* Social grid */
  .social-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 24px;
    text-decoration: none;
    border: 1px solid rgba(201,168,76,0.15);
    background: rgba(255,255,255,0.02);
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
    cursor: pointer;
  }

  .social-link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .social-link::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    transform: scaleY(0);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    transform-origin: center;
  }

  .social-link:hover {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.04);
    transform: translateX(6px);
  }

  .social-link:hover::before { opacity: 1; }
  .social-link:hover::after { transform: scaleY(1); }

  .social-link:nth-child(1) { animation-delay: 0.7s; }
  .social-link:nth-child(2) { animation-delay: 0.85s; }
  .social-link:nth-child(3) { animation-delay: 1.0s; }
  .social-link:nth-child(4) { animation-delay: 1.15s; }

  .icon-wrap {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .icon-wrap svg {
    width: 22px;
    height: 22px;
    transition: transform 0.3s ease;
  }

  .social-link:hover .icon-wrap svg {
    transform: scale(1.15);
  }

  .link-text {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .link-platform {
    display: block;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    margin-bottom: 3px;
    opacity: 0.8;
  }

  .link-handle {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  .link-arrow {
    width: 20px;
    height: 20px;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.3s ease;
  }

  .social-link:hover .link-arrow {
    opacity: 0.6;
    transform: translateX(0);
  }

  .link-arrow svg {
    width: 16px;
    height: 16px;
    stroke: var(--gold);
  }

  /* Instagram gradient icon */
  .ig-icon { fill: url(#igGrad); }
  /* Facebook */
  .fb-icon { fill: #1877F2; }
  /* YouTube */
  .yt-icon { fill: #FF0000; }
  /* TikTok */
  .tt-icon-1 { fill: #69C9D0; }
  .tt-icon-2 { fill: #EE1D52; }
  .tt-icon-3 { fill: #ffffff; }

  /* Bottom rule */
  .bottom {
    margin-top: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeUp 1s ease forwards;
    opacity: 0;
    animation-delay: 1.4s;
  }

  .bottom-rule {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }

  .bottom-mark {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.35);
    font-weight: 200;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Ripple on click */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
  }

  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }
</style>
</head>

<script>
  // Ripple effect on click
  document.querySelectorAll('.social-link').forEach(link => {
    link.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
    });
  });
</script>
