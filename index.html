<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabrina Nails ✦ أظافر الجمال</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF8F3;
    --blush: #F2D5CE;
    --dusty-rose: #D4948A;
    --mauve: #A67070;
    --deep: #5C3D3D;
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --white: #FFFDF9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    font-family: 'Montserrat', sans-serif;
    color: var(--deep);
    overflow-x: hidden;
  }

  /* ===== NOISE TEXTURE OVERLAY ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ===== NAVIGATION ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(253, 248, 243, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201, 169, 110, 0.2);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--deep);
    letter-spacing: 2px;
    text-decoration: none;
  }

  .nav-logo span {
    color: var(--gold);
    font-style: italic;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--mauve);
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 400;
    transition: color 0.3s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0; right: 0;
    height: 1px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .nav-links a:hover { color: var(--deep); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* ===== HERO ===== */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 140px 60px 80px 80px;
    position: relative;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 28px;
  }

  .hero-badge::before {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--gold);
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 6vw, 5.5rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--deep);
    margin-bottom: 12px;
  }

  .hero-title em {
    font-style: italic;
    color: var(--dusty-rose);
  }

  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 300;
    font-style: italic;
    color: var(--mauve);
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .hero-desc {
    font-size: 0.75rem;
    line-height: 2;
    color: var(--mauve);
    font-weight: 300;
    letter-spacing: 0.5px;
    max-width: 340px;
    margin-bottom: 48px;
    direction: rtl;
  }

  .hero-actions {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--deep);
    color: var(--cream);
    text-decoration: none;
    padding: 16px 36px;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }

  .btn-primary:hover::before { transform: translateX(0); }
  .btn-primary span { position: relative; z-index: 1; }

  .btn-secondary {
    text-decoration: none;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mauve);
    font-weight: 400;
    border-bottom: 1px solid var(--blush);
    padding-bottom: 2px;
    transition: border-color 0.3s, color 0.3s;
  }

  .btn-secondary:hover {
    color: var(--deep);
    border-color: var(--gold);
  }

  .hero-right {
    position: relative;
    overflow: hidden;
  }

  .hero-image-area {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--blush) 0%, var(--dusty-rose) 50%, var(--mauve) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nail-showcase {
    position: relative;
    width: 320px;
    height: 420px;
  }

  /* Big nail art illustration */
  .nail-card {
    position: absolute;
    border-radius: 60px 60px 30px 30px;
    box-shadow: 0 30px 80px rgba(92, 61, 61, 0.3);
    animation: float 4s ease-in-out infinite;
  }

  .nail-1 {
    width: 100px; height: 130px;
    background: linear-gradient(160deg, #f8c8d4, #e8a0b4, #c97090);
    top: 20px; left: 20px;
    animation-delay: 0s;
  }
  .nail-1::after {
    content: '';
    position: absolute;
    top: 15px; left: 15px; right: 15px;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
    border-radius: 50px 50px 0 0;
  }

  .nail-2 {
    width: 80px; height: 110px;
    background: linear-gradient(160deg, #fde8c0, #f5c87a, #d4a050);
    top: 60px; left: 130px;
    animation-delay: 0.8s;
  }
  .nail-2::after {
    content: '';
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.45), transparent);
    border-radius: 50px 50px 0 0;
  }

  .nail-3 {
    width: 110px; height: 145px;
    background: linear-gradient(160deg, #e8c8e8, #c890c8, #906090);
    top: 80px; right: 20px;
    animation-delay: 1.5s;
  }
  .nail-3::after {
    content: '';
    position: absolute;
    top: 15px; left: 15px; right: 15px;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.45), transparent);
    border-radius: 50px 50px 0 0;
  }

  .nail-4 {
    width: 90px; height: 120px;
    background: linear-gradient(160deg, #ffd0d0, #ff9898, #d06060);
    bottom: 80px; left: 10px;
    animation-delay: 2s;
  }
  .nail-4::after {
    content: '';
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    border-radius: 50px 50px 0 0;
  }

  .nail-5 {
    width: 95px; height: 125px;
    background: linear-gradient(160deg, #d0e8d0, #80c080, #408040);
    bottom: 40px; right: 30px;
    animation-delay: 0.4s;
  }
  .nail-5::after {
    content: '';
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    border-radius: 50px 50px 0 0;
  }

  /* Sparkle decorations */
  .sparkle {
    position: absolute;
    font-size: 1.2rem;
    animation: sparkle 2s ease-in-out infinite;
  }
  .sparkle:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: 20%; right: 10%; animation-delay: 0.7s; }
  .sparkle:nth-child(3) { bottom: 25%; left: 5%; animation-delay: 1.2s; }
  .sparkle:nth-child(4) { bottom: 10%; right: 8%; animation-delay: 0.4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(1deg); }
  }

  @keyframes sparkle {
    0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
    50% { opacity: 0.4; transform: scale(1.3) rotate(20deg); }
  }

  /* Decorative circle in hero */
  .hero-circle {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-circle-2 {
    position: absolute;
    width: 650px; height: 650px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* ===== FLOATING STATS ===== */
  .hero-stats {
    position: absolute;
    bottom: 40px;
    left: 80px;
    display: flex;
    gap: 48px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--deep);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mauve);
    font-weight: 400;
    margin-top: 4px;
  }

  /* ===== MARQUEE ===== */
  .marquee-section {
    background: var(--deep);
    padding: 18px 0;
    overflow: hidden;
  }

  .marquee-track {
    display: flex;
    gap: 60px;
    animation: marquee 18s linear infinite;
    width: max-content;
  }

  .marquee-item {
    font-size: 0.65rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 300;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .marquee-item::after { content: '✦'; color: var(--gold); }

  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ===== SECTION STYLES ===== */
  section { padding: 100px 80px; }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--gold);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 4vw, 3.8rem);
    font-weight: 300;
    color: var(--deep);
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .section-title em {
    font-style: italic;
    color: var(--dusty-rose);
  }

  .section-desc {
    font-size: 0.78rem;
    line-height: 2;
    color: var(--mauve);
    font-weight: 300;
    max-width: 480px;
  }

  /* ===== CATEGORIES ===== */
  #collections {
    background: var(--white);
  }

  .collections-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: end;
    margin-bottom: 64px;
  }

  .collections-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .collection-card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    group: true;
  }

  .collection-card:first-child {
    grid-column: span 2;
    grid-row: span 1;
  }

  .card-visual {
    width: 100%;
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
  }

  .collection-card:first-child .card-visual {
    aspect-ratio: 2/1;
  }

  .card-bg {
    width: 100%;
    height: 100%;
    transition: transform 0.6s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .collection-card:hover .card-bg { transform: scale(1.05); }

  /* Individual card themes */
  .card-bg-1 {
    background: linear-gradient(135deg, #f5e0e8 0%, #e8b4c8 50%, #c88098 100%);
  }
  .card-bg-2 {
    background: linear-gradient(135deg, #ede0f5 0%, #c8b4e8 50%, #9870c8 100%);
  }
  .card-bg-3 {
    background: linear-gradient(135deg, #f5f0e0 0%, #e8d4a0 50%, #c8a060 100%);
  }
  .card-bg-4 {
    background: linear-gradient(135deg, #e0f0f5 0%, #a0c8e0 50%, #6098c0 100%);
  }

  .card-nail-preview {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .mini-nail {
    border-radius: 30px 30px 15px 15px;
    position: relative;
    overflow: hidden;
  }

  .mini-nail::after {
    content: '';
    position: absolute;
    top: 8px; left: 6px; right: 6px;
    height: 40%;
    background: rgba(255,255,255,0.4);
    border-radius: 20px 20px 0 0;
  }

  .card-info {
    padding: 20px 0 4px;
  }

  .card-category {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--deep);
    margin-bottom: 6px;
  }

  .card-price {
    font-size: 0.72rem;
    color: var(--mauve);
    font-weight: 300;
  }

  /* Card overlay on hover */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(92, 61, 61, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .collection-card:hover .card-overlay { opacity: 1; }

  .card-cta {
    color: var(--cream);
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 12px 28px;
    font-weight: 400;
    text-decoration: none;
  }

  /* ===== PROCESS SECTION ===== */
  #process {
    background: var(--deep);
    color: var(--cream);
  }

  #process .section-title { color: var(--cream); }
  #process .section-desc { color: rgba(253, 248, 243, 0.6); }

  .process-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    margin-top: 64px;
  }

  .process-step {
    position: relative;
    padding-top: 24px;
    border-top: 1px solid rgba(201, 169, 110, 0.3);
  }

  .step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: rgba(201, 169, 110, 0.3);
    line-height: 1;
    margin-bottom: 16px;
  }

  .step-icon {
    font-size: 1.6rem;
    margin-bottom: 16px;
  }

  .step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 10px;
  }

  .step-desc {
    font-size: 0.7rem;
    line-height: 1.9;
    color: rgba(253, 248, 243, 0.55);
    font-weight: 300;
  }

  /* ===== GALLERY ===== */
  #gallery {
    background: var(--cream);
    padding: 100px 0;
  }

  #gallery .inner-header {
    padding: 0 80px;
    margin-bottom: 48px;
  }

  .gallery-scroll {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding: 0 80px 20px;
    scrollbar-width: none;
  }

  .gallery-scroll::-webkit-scrollbar { display: none; }

  .gallery-item {
    flex-shrink: 0;
    width: 280px;
    height: 360px;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .gallery-item-bg {
    width: 100%; height: 100%;
    transition: transform 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gallery-item:hover .gallery-item-bg { transform: scale(1.04); }

  .gi-1 { background: linear-gradient(160deg, #f5d0dc, #e8a0b8, #c06080); }
  .gi-2 { background: linear-gradient(160deg, #ffe8d0, #f5c890, #d09050); }
  .gi-3 { background: linear-gradient(160deg, #d0e8f5, #90c0e8, #5090c0); }
  .gi-4 { background: linear-gradient(160deg, #e0d0f5, #c090e0, #9060b0); }
  .gi-5 { background: linear-gradient(160deg, #d0f5e0, #90e0a8, #50a870); }
  .gi-6 { background: linear-gradient(160deg, #f5f0d0, #e8d890, #c0a848); }

  .gallery-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 30px 20px 20px;
    background: linear-gradient(to top, rgba(92,61,61,0.8), transparent);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    font-style: italic;
  }

  /* Large nail art display in gallery items */
  .gallery-nail-art {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .g-nail {
    border-radius: 40px 40px 20px 20px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .g-nail::after {
    content: '';
    position: absolute;
    top: 12px; left: 10px; right: 10px;
    height: 45%;
    background: rgba(255,255,255,0.35);
    border-radius: 30px 30px 0 0;
  }

  /* ===== TESTIMONIALS ===== */
  #testimonials {
    background: var(--white);
  }

  .testimonials-header {
    text-align: center;
    margin-bottom: 64px;
  }

  .testimonials-header .section-label {
    justify-content: center;
  }

  .testimonials-header .section-label::before { display: none; }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }

  .review-card {
    padding: 36px;
    background: var(--cream);
    border: 1px solid rgba(201, 169, 110, 0.2);
    position: relative;
  }

  .review-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    color: var(--blush);
    line-height: 0.5;
    margin-bottom: 20px;
  }

  .review-text {
    font-size: 0.78rem;
    line-height: 2;
    color: var(--mauve);
    font-weight: 300;
    margin-bottom: 28px;
    direction: rtl;
  }

  .review-stars {
    color: var(--gold);
    font-size: 0.8rem;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .reviewer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--deep);
  }

  .reviewer-tag {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
  }

  /* ===== CTA SECTION ===== */
  #contact {
    background: linear-gradient(135deg, var(--blush) 0%, var(--dusty-rose) 100%);
    text-align: center;
    padding: 120px 80px;
    position: relative;
    overflow: hidden;
  }

  #contact::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  #contact::after {
    content: '';
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  #contact .section-label { justify-content: center; color: rgba(255,255,255,0.7); }
  #contact .section-label::before { background: rgba(255,255,255,0.5); }
  #contact .section-title { color: white; }
  #contact .section-desc { color: rgba(255,255,255,0.75); margin: 0 auto 48px; }

  .contact-actions {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 2;
  }

  .btn-white {
    background: white;
    color: var(--deep);
    text-decoration: none;
    padding: 18px 44px;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
    transition: all 0.3s;
  }

  .btn-white:hover {
    background: var(--deep);
    color: white;
  }

  .btn-outline-white {
    border: 1px solid white;
    color: white;
    text-decoration: none;
